name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

      - name: Test
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Deno check
        run: npm run deno:check

      - name: Deno lint
        run: npm run deno:lint

      - name: Deno format
        run: npm run deno:fmt

      - name: Deno dependency integrity
        run: npm run deno:lock

      - name: Deno dependency update check
        run: npm run deno:outdated

      - name: npm audit
        run: npm audit

      - name: Browser build
        run: npm run build:browser

      - name: Browser smoke e2e
        run: npm run test:e2e

      - name: Start Supabase
        timeout-minutes: 10
        run: npm run supabase:start

      - name: Reset Supabase database
        timeout-minutes: 6
        run: npm run supabase:reset

      - name: Export Supabase local status
        timeout-minutes: 1
        run: npx supabase status -o env | grep '^[A-Z0-9_]*=' | sed 's/^\([^=]*\)="\(.*\)"$/\1=\2/' >> "$GITHUB_ENV"

      - name: Supabase migration lint
        timeout-minutes: 2
        run: npm run supabase:lint

      - name: Supabase integration tests
        timeout-minutes: 3
        run: npm run test:integration

      - name: Stop Supabase
        if: always()
        timeout-minutes: 2
        run: npm run supabase:stop
